<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature - Converter</title>
</head>
<body>
    <div>
        <h1> Unit Converter</h1>
        <div>
            <a href = "./index.html">Length</a>
            <a href = "./weight.html">Weight</a>
            <a href = "./temperature.html">Temperature</a>
         </div>

        <div>
            <div>
                <label> Enter Value: </label>
                <input type="number" id="temp-value" placeholder="Enter value">
            </div>

            <div>
                <label>Unit to convert from</label>
                <select id="temp-from">
                    <option value="celsius">Celsius(°C)</option>
                    <option value="fahrenheit">Fahrenheit(°F)</option>
                    <option value="kelvin">Kelvin(K)</option>
                </select>
            </div>

            <div>
                <label>Unit to convert to</label>
                <select id="temp-to">
                    <option value="celsius">Celsius(°C)</option>
                    <option value="fahrenheit">Fahrenheit(°F)</option>
                    <option value="kelvin">Kelvin(K)</option>
                </select>
            </div>

            <button id="temp-convert">Convert</button>
        </div>
        
        <div id = "result">
            <h3>Result to convert</h3>
            <p id = "result-text"></p>
            <button id = "reset-btn">Reset</button>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
