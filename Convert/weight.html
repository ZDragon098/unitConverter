<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weight-Converter</title>
</head>
<body>
    <div>
        <h1> Unit Converter</h1>

        <!-- Tabs -->
         <div>
            <a href = "./index.html">Length</a>
            <a href = "./weight.html">Weight</a>
            <a href = "./temperature.html">Temperature</a>
         </div>
        
        <!-- Input Section -->
        <div>
            <div>
                <label> Enter Value: </label>
                <input type="number" id="weight-value" placeholder="Enter value">
            </div>

            <div>
                <label>Unit to convert from</label>
                <select id="weight-from">
                    <option value="kilogram">Kilogram</option>
                    <option value="gram">Gram</option>
                </select>
            </div>

            <div>
                <label>Unit to convert to</label>
                <select id="weight-to">
                    <option value="kilogram">Kilogram</option>
                    <option value="gram">Gram</option>
                </select>
            </div>

            <button id="weight-convert">Convert</button>
        </div>

        <div id = "result">
            <h3>Result to convert</h3>
            <p id = "result-text"></p>

            <button id = "reset-btn">Reset</button>
        </div>
    </div>

    <script src="./main.js"></script>
</body>
</html>
